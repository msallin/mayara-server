name: Docker

on:
  workflow_dispatch:
  workflow_call:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            target: x86_64-unknown-linux-musl
          - platform: linux/arm64
            target: aarch64-unknown-linux-musl

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Install Cross
      run: cargo install cross

    - name: Build binary
      run: cross build --release --target ${{ matrix.target }}

    - name: Upload binary
      uses: actions/upload-artifact@v7
      with:
        name: docker-${{ matrix.target }}
        path: target/${{ matrix.target }}/release/mayara-server
        overwrite: true

  push:
    name: Build and push Docker image
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Download amd64 binary
      uses: actions/download-artifact@v8
      with:
        name: docker-x86_64-unknown-linux-musl
        path: build/linux/amd64

    - name: Download arm64 binary
      uses: actions/download-artifact@v8
      with:
        name: docker-aarch64-unknown-linux-musl
        path: build/linux/arm64

    - name: Make binaries executable
      run: chmod +x build/linux/*/mayara-server

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v6
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=raw,value=latest,enable={{is_default_branch}}
          type=ref,event=branch,enable=${{ github.ref != format('refs/heads/{0}', github.event.repository.default_branch) }}
          type=semver,pattern={{version}}
          type=sha,prefix=

    - name: Build and push
      uses: docker/build-push-action@v7
      with:
        context: .
        file: Dockerfile.ci
        platforms: linux/amd64,linux/arm64
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
