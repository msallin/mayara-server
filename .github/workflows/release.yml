name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64-unknown-linux-musl, aarch64-unknown-linux-musl]

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Install Cross
      run: cargo install cross

    - name: Build
      run: cross build --release --target ${{ matrix.target }}

    - name: Package
      run: |
        cd target/${{ matrix.target }}/release
        tar -czvf mayara-server-${{ github.ref_name }}-${{ matrix.target }}.tar.gz mayara-server
        mv mayara-server-${{ github.ref_name }}-${{ matrix.target }}.tar.gz ../../../

    - name: Upload artifact
      uses: actions/upload-artifact@v7
      with:
        name: mayara-server-${{ matrix.target }}
        path: mayara-server-${{ github.ref_name }}-${{ matrix.target }}.tar.gz

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Build
      run: cargo build --release

    - name: Package
      run: Compress-Archive -Path target/release/mayara-server.exe -DestinationPath mayara-server-${{ github.ref_name }}-x86_64-pc-windows.zip

    - name: Upload artifact
      uses: actions/upload-artifact@v7
      with:
        name: mayara-server-windows
        path: mayara-server-${{ github.ref_name }}-x86_64-pc-windows.zip

  release:
    name: Create Release
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Download all artifacts
      uses: actions/download-artifact@v8
      with:
        path: artifacts

    - name: List artifacts
      run: find artifacts -type f

    - name: Generate release notes
      uses: orhun/git-cliff-action@v4
      with:
        config: cliff.toml
        args: --latest --strip header --tag ${{ github.ref_name }}
      env:
        OUTPUT: CHANGES.md
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Generate full changelog
      uses: orhun/git-cliff-action@v4
      with:
        config: cliff.toml
        args: --output CHANGELOG.md --tag ${{ github.ref_name }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Append historical changelog
      run: |
        printf '\n' >> CHANGELOG.md
        cat CHANGELOG.manual.md >> CHANGELOG.md

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        body_path: CHANGES.md
        files: |
          artifacts/mayara-server-x86_64-unknown-linux-musl/*.tar.gz
          artifacts/mayara-server-aarch64-unknown-linux-musl/*.tar.gz
          artifacts/mayara-server-windows/*.zip

    - name: Commit changelog
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        cp CHANGELOG.md /tmp/CHANGELOG.md
        git fetch origin main
        git switch -C main origin/main
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        cp /tmp/CHANGELOG.md CHANGELOG.md
        git add CHANGELOG.md
        if ! git diff --staged --quiet; then
          BRANCH="docs-changelog-${{ github.ref_name }}-${{ github.run_id }}-${{ github.run_attempt }}"
          git switch -C "$BRANCH"
          git commit -m "docs: update CHANGELOG.md for ${{ github.ref_name }}"
          git push --set-upstream origin "$BRANCH"
          PR_URL="$(gh pr create --title "docs: update CHANGELOG.md for ${{ github.ref_name }}" --body "Auto-generated changelog update." --base main --head "$BRANCH")"
          gh pr merge "$PR_URL" --squash --delete-branch --auto
        fi

  docker:
    name: Publish Docker Image
    needs: release
    uses: ./.github/workflows/docker.yml
    permissions:
      contents: read
      packages: write
