services:
  # Emulator mode: works out of the box, no radar hardware needed
  # Uses pre-built image from GHCR. To build locally instead, add: build: .
  mayara-server:
    image: ghcr.io/marineyachtradar/mayara-server:latest
    command: ["mayara-server", "--emulator"]
    ports:
      - "6502:6502"
    tmpfs:
      - /home/mayara/.config/mayara
      - /home/mayara/.local/share/mayara
      - /tmp
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped

  # Example: real radar with persistent config and recordings
  # mayara-radar:
